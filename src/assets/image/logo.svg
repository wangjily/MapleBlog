<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="50%" style="stop-color:#ea580c"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glassBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Glass background card -->
  <rect x="0" y="4" width="56" height="52" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <rect x="1" y="5" width="54" height="50" rx="13" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="0.5" stroke-dasharray="2 2"/>

  <!-- Maple leaf icon -->
  <g transform="translate(28, 30)" filter="url(#glow)">
    <!-- Center stem -->
    <line x1="0" y1="4" x2="0" y2="-14" stroke="url(#leafGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Left branch -->
    <line x1="0" y1="-2" x2="-8" y2="-8" stroke="url(#leafGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Right branch -->
    <line x1="0" y1="-2" x2="8" y2="-8" stroke="url(#leafGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Left lower branch -->
    <line x1="0" y1="1" x2="-7" y2="-3" stroke="url(#leafGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Right lower branch -->
    <line x1="0" y1="1" x2="7" y2="-3" stroke="url(#leafGrad)" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Leaf 1 - top -->
    <path d="M0,-14 C-4,-17 -9,-16 -10,-13 C-11,-10 -8,-7 -4,-8 C-2,-8.5 0,-10 0,-14Z" fill="url(#leafGrad)" opacity="0.95"/>
    <!-- Leaf 2 - top left -->
    <path d="M-8,-8 C-11,-11 -14,-10 -15,-7 C-16,-4 -13,-1 -9,-2 C-7,-2.5 -5,-4 -8,-8Z" fill="url(#leafGrad)" opacity="0.85"/>
    <!-- Leaf 3 - top right -->
    <path d="M8,-8 C11,-11 14,-10 15,-7 C16,-4 13,-1 9,-2 C7,-2.5 5,-4 8,-8Z" fill="url(#leafGrad)" opacity="0.85"/>
    <!-- Leaf 4 - left -->
    <path d="M-7,-3 C-10,-6 -12,-4 -12,-1 C-12,2 -9,3 -6,1 C-5,0.5 -4,-1 -7,-3Z" fill="url(#leafGrad)" opacity="0.75"/>
    <!-- Leaf 5 - right -->
    <path d="M7,-3 C10,-6 12,-4 12,-1 C12,2 9,3 6,1 C5,0.5 4,-1 7,-3Z" fill="url(#leafGrad)" opacity="0.75"/>
    <!-- Leaf 6 - bottom left -->
    <path d="M-5,2 C-8,-1 -10,1 -10,4 C-10,7 -7,8 -4,6 C-3,5.5 -2,4 -5,2Z" fill="url(#leafGrad)" opacity="0.65"/>
    <!-- Leaf 7 - bottom right -->
    <path d="M5,2 C8,-1 10,1 10,4 C10,7 7,8 4,6 C3,5.5 2,4 5,2Z" fill="url(#leafGrad)" opacity="0.65"/>
  </g>

  <!-- Site name text -->
  <text x="68" y="28" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="url(#textGrad)">Maple</text>
  <text x="68" y="47" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#888" letter-spacing="3">BLOG</text>
</svg>
